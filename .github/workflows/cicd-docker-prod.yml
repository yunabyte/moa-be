name: SpringBoot Docker CI/CD - Prod V2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod

    env:
      REGISTRY: ghcr.io
      REPO: ${{ github.repository }}

    steps:
      - name: 🐵 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐵 Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🐵 Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: 🐵 Build with Gradle (Without Tests)
        run: |
          echo "🐵 Building JAR without tests..."
          ./gradlew clean build -x test || { echo '🚨 Build failed!'; exit 1; }
          echo "✅ Build completed successfully!"

      - name: 🐵 Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🔍 Debug: show files
        run: |
          pwd
          ls -al

      - name: 🐵 Build Docker Image
        run: |
          docker build -f ./Dockerfile -t ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.REPO }}:latest

      - name: 🐵 Push to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REPO }}:latest

      - name: 🐵 Save SSH Key
        run: |
          echo "🐵 Saving SSH key..."
          echo "${{ secrets.GCP_CICD_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          echo "✅ SSH key saved!"

      - name: 🐵 Deploy to GCP VM (Dockerized)
        run: |
          echo "🐵 Writing .env and restarting Docker container..."

          ssh -i key.pem -o StrictHostKeyChecking=no cicd@${{ secrets.GCP_BE_DEV_HOST }} << 'EOF'
            echo "🐵 Logging in to GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || {
              echo "🚨 GHCR login failed!"; exit 1;
            }

          echo "🐵 Writing .env on remote server..."
            cat <<EENV | sudo tee /home/cicd/moa-backend.env > /dev/null
          SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILE }}
          SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          AI_SERVER_URL=${{ secrets.AI_SERVER_URL }}
          KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_ADMIN_KEY=${{ secrets.KAKAO_ADMIN_KEY }}
          EENV
            sudo chmod 600 /home/cicd/moa-backend.env
            sudo chown cicd:cicd /home/cicd/moa-backend.env
            echo "✅ .env file written and secured!"

            echo "🐵 Stopping existing container..."
            docker stop moa-backend || true
            docker rm moa-backend || true

            echo "🐵 Pulling latest image..."
            docker pull ghcr.io/${{ github.repository }}:latest || {
              echo "🚨 Failed to pull image!"; exit 1;
            }

            echo "🐵 Starting new container..."
            docker run -d --name moa-backend -p 8080:8080 \
              --env-file /home/cicd/moa-backend.env \
              --restart unless-stopped \
              ghcr.io/${{ github.repository }}:latest || {
                echo "🚨 Failed to start container!"; exit 1;
              }

            echo "✅ Container started!"

            echo "🐵 Logs:"
            docker logs --tail 20 moa-backend || echo "🚨 Failed to fetch logs"
          EOF